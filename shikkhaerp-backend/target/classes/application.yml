spring:
  application:
    name: ShikkhaERP
  profiles:
    active: dev
  datasource:
    url: jdbc:h2:mem:shikkhaerp
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    com.shikkhaerp: DEBUG

app:
  security:
    jwt:
      secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000