spring:
  application:
    name: ShikkhaERP
  profiles:
    active: dev
  
  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/shikkhaerp
    username: postgres
    password: Farhana251@
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  # Disable H2 console
  h2:
    console:
      enabled: false

